<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Game Night 🎲</title>

  <!-- Ícone da aba (dado) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">

  <!-- Fontes (mesma família usada nos jogos, pra manter a identidade) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="estilo.css">
</head>
<body>

  <main class="hub">

    <!-- ================= CABEÇALHO ================= -->
    <header class="cabecalho">
      <div class="eyebrow">🌙 Noite de Jogos</div>
      <h1 class="logo">GAME NIGHT</h1>
      <p class="tagline">Escolha um jogo e reúna a galera.</p>
    </header>

    <!-- ================= MESA E RANKING ================= -->
    <section class="paineis-topo">
      <button class="chip-painel" id="chip-mesa" onclick="alternarPainel('painel-mesa')">👥 Jogadores</button>
      <button class="chip-painel" id="chip-ranking" onclick="alternarPainel('painel-ranking')">🏆 Ranking</button>
    </section>

    <!-- Mesa: cadastre a galera uma vez e os nomes entram nos jogos -->
    <section class="painel" id="painel-mesa">
      <p class="painel-dica">Cadastre a galera uma vez: os nomes entram automaticamente nos jogos e alimentam o ranking. 🎉</p>
      <div class="add-row">
        <input type="text" id="input-nome" maxlength="14" placeholder="Nome do jogador" autocomplete="off">
        <button class="btn-add" onclick="hubAdicionarJogador()">+</button>
      </div>
      <div class="lista-mesa" id="lista-mesa"></div>
    </section>

    <!-- Ranking: geral e por jogo -->
    <section class="painel" id="painel-ranking">
      <div class="abas-ranking" id="abas-ranking"></div>
      <div class="ranking-lista" id="ranking-lista"></div>
      <button class="btn-zerar" onclick="hubZerarRanking()">🗑 Zerar ranking</button>
    </section>

    <!-- ================= LISTA DE JOGOS ================= -->
    <!-- Preenchida automaticamente pelo app.js a partir do jogos.js -->
    <section id="lista-jogos" class="lista-jogos"></section>

    <!-- ================= RODAPÉ ================= -->
    <footer class="rodape">
      <span id="contador-jogos"></span>
    </footer>

  </main>

  <!-- Mesa global e ranking compartilhado entre os jogos -->
  <script src="ranking.js"></script>
  <!-- Banco de jogos: edite ESTE arquivo para adicionar novos jogos -->
  <script src="jogos.js"></script>
  <!-- Lógica que monta os cards -->
  <script src="app.js"></script>
</body>
</html>
